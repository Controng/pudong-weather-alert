name: Deploy GitHub Pages

# Deploys docs/ to GitHub Pages whenever the data or the H5 page changes.
# Enable Pages: Settings → Pages → Build from branch → gh-pages (or use the
# Pages workflow below; this one pushes to gh-pages automatically).

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages-deploy.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
