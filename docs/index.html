<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>浦东新区橙红天气预警</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar__inner">
      <div class="brand">
        <span class="brand__dot"></span>
        <h1>浦东新区橙红天气预警</h1>
      </div>
      <div class="topbar__meta">
        <span id="lastUpdated" class="muted">—</span>
        <a class="topbar__link" href="data/warnings.json" target="_blank" rel="noopener">原始 JSON</a>
      </div>
    </div>
  </header>

  <main class="main">
    <!-- Summary tiles -->
    <section class="summary" id="summary">
      <div class="tile tile--red">
        <div class="tile__count" id="cntRed">0</div>
        <div class="tile__label">红色预警</div>
      </div>
      <div class="tile tile--orange">
        <div class="tile__count" id="cntOrange">0</div>
        <div class="tile__label">橙色预警</div>
      </div>
      <div class="tile tile--days">
        <div class="tile__count" id="cntDays">0</div>
        <div class="tile__label">覆盖天数</div>
      </div>
      <div class="tile tile--types">
        <div class="tile__count" id="cntTypes">0</div>
        <div class="tile__label">预警类型</div>
      </div>
    </section>

    <!-- Calendar -->
    <section class="section">
      <div class="section__head">
        <h2>日历视图</h2>
        <div class="calendar__nav">
          <button id="calPrev" class="btn">‹</button>
          <span id="calLabel" class="calendar__label">—</span>
          <button id="calNext" class="btn">›</button>
          <button id="calToday" class="btn btn--ghost">回到今天</button>
        </div>
      </div>
      <div id="calendar" class="calendar" role="grid"></div>
      <p class="muted small">单元格颜色: <span class="dot dot--red"></span>红色 &nbsp;<span class="dot dot--orange"></span>橙色 &nbsp;<span class="dot dot--mix"></span>当日多条 / 多类型。点击单元格查看详情。</p>
    </section>

    <!-- Detail panel -->
    <section class="section section--hidden" id="detailSection">
      <div class="section__head">
        <h2 id="detailDate">—</h2>
        <button id="detailClose" class="btn btn--ghost">关闭</button>
      </div>
      <div id="detailList" class="detail-list"></div>
    </section>

    <!-- Raw table -->
    <section class="section">
      <div class="section__head">
        <h2>原始数据</h2>
        <div class="table__controls">
          <input id="search" class="input" type="search" placeholder="搜索类型 / 描述…" />
          <select id="levelFilter" class="input">
            <option value="">全部级别</option>
            <option value="红色">红色</option>
            <option value="橙色">橙色</option>
          </select>
          <select id="areaFilter" class="input">
            <option value="浦东新区">仅浦东新区</option>
            <option value="">全部区域</option>
          </select>
        </div>
      </div>
      <div class="table__wrap">
        <table class="table" id="rawTable">
          <thead>
            <tr>
              <th>Date from</th>
              <th>Date to</th>
              <th>发布时间</th>
              <th>级别</th>
              <th>类型</th>
              <th>区域</th>
              <th>详情</th>
            </tr>
          </thead>
          <tbody id="rawTableBody">
            <tr><td colspan="7" class="muted center">加载中…</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>
      数据来源:
      <a href="https://sh.weather.com.cn/zhyj/index.shtml" target="_blank" rel="noopener">上海气象 · 预警发布</a>
      · 由 GitHub Actions 自动每天抓取
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
